schema: spec-driven

# Project context (shown to AI when creating artifacts).
context: |
  Project: todo-bhvr — a todo app grown on top of the `bhvr` template.
  Repo: Bun + Turbo monorepo. Package manager: bun@1.2.4. Build orchestration: turbo (respects `^build`: shared → server/client).

  Workspaces:
  - `shared/` — plain TypeScript types only (`shared/src/types/`), re-exported from `shared/src/index.ts`. Built to `shared/dist/` (tsc) before consumers typecheck (handled by `postinstall` + turbo `^build`). Indent: tabs.
  - `server/` — single chained Hono app in `src/index.ts` (`new Hono().use(...).get(...).route(...)`). Exports `AppType = typeof app`. Default export `{ port, fetch }` (Bun auto-serves; Cloudflare Workers accept the same shape). Env: `PORT` (3001), `CLIENT_URL` (CORS origin, default `*`). Builds to `dist/` incl. `dist/index.d.ts`. Indent: 2 spaces. Request-body validation via `hono/validator` (keeps the route's `json` input in the RPC type — no zod dep).
  - `client/` — Vite + React 19. Routing: TanStack Router, file-based routes in `src/routes/` (`__root.tsx` + route files); `src/routeTree.gen.ts` is GENERATED by `@tanstack/router-plugin` (in `vite.config.ts`, before `@vitejs/plugin-react`) — never hand-edit. Data: TanStack Query (`QueryClientProvider` wraps `RouterProvider` in `src/main.tsx`); optimistic-update mutations with rollback + `sonner` toasts. Styling: Tailwind v4 via `@tailwindcss/vite` — config lives in `src/index.css`, no `tailwind.config.*`; DO NOT change the font/typography in `src/index.css`. UI: shadcn "new-york" primitives in `src/components/ui/` (`components.json`), landing sections in `src/components/landing/`. Alias `@/` → `client/src/`. Dev server port 3000; expects API at `localhost:3001`.

  Type-sharing pipeline (the core idea):
  1. `shared/` exports plain types consumed by both sides via `import ... from "shared"` (needs `shared/dist` built first).
  2. `server/` exports `AppType`; client imports it TYPE-ONLY (`import type { AppType } from "server"`) in `client/src/lib/api.ts` and builds `hc<AppType>(SERVER_URL)`. `verbatimModuleSyntax` erases the import, so no server code in the client bundle — runtime contact is just `fetch()` to `VITE_SERVER_URL` (default `http://localhost:3001`). Client and server stay independently deployable.
  Consequence: editing server routes changes the client's RPC types, but only after `server/dist/index.d.ts` is regenerated (`bun run dev:server` keeps `tsc --watch` running for this).

  Commands: `bun install` (postinstall builds shared + server); `bun run dev` (turbo dev all); `bun run dev:client` / `dev:server`; `bun run build` / `build:client` / `build:server`; `bun run lint` (only client has eslint); `bun run type-check`; `bun run test` (no tests yet). Single workspace: `turbo <task> --filter=<client|server|shared>`.

